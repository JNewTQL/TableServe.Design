<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Example</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container">
      <table class="table">
        <thead>
          <tr>
            <th>First</th>
            <th>Last</th>
            <th>Age</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Justin</td>
            <td>New</td>
            <td>35</td>
          </tr>
          <tr>
            <td>Landon</td>
            <td>Shotts</td>
            <td>28</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
