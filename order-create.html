<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Order</title>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <h2>New Order</h2>
        <hr />
          <div class="mb-3">
        <form class="d-flex flex-wrap w-75 gap-2">
            <label for="tablenumber" class="form-label">Table Number</label>
            <input id="tablenumber" type="number" class="form-control" placeholder="Enter table number"/>
          </div>
        </form>
        
          <div class="mb-3">
        <form class="d-flex flex-wrap w-75 gap-2">
            <label for="notes" class="form-label">Notes</label>
            <textarea class="form-control" placeholder="Enter notes"></textarea>
          </div>
        </form>
         <div class="mb-3 w-50">
              <label for="menuItemId" class="form-label">Status</label>
              <select id="menuItemId" class="form-select" disabled>
                <option value="1" selected>Placed</option>
              </select>
            </div>
             <div class="mb-3 w-50">
              <label for="menuItemId" class="form-label">Staff</label>
              <select id="menuItemId" class="form-select" disabled>
                <option value="0" selected>Jordan Reyes</option>
              </select>
            </div>
        <div class="d-flex flex-row justify-content-end w-100 gap-4">
          <div class="d-flex justify-content-end mt-4">
            <a href="/orders.html" class="btn btn-outline-primary me-2">Cancel</a>
            <button type="submit" class="btn btn-primary">
              <svg class="bi pe-none me-2" width="16" height="16" fill="#FFFFFF">
                <use href="/assets/bootstrap-icons.svg#save" />
              </svg>
              Save order
            </button>
          </div>
        </div>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
