<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Order</title>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <h2>New Order</h2>
        <hr />

        <form class="d-flex flex-column w-100" novalidate data-success="/orders.html">
          <div class="mb-3 w-75">
            <label for="tablenumber" class="form-label">Table Number</label>
            <input id="tablenumber" type="number" class="form-control" placeholder="Enter table number" required />
            <div class="invalid-feedback">Table number is required</div>
          </div>

          <div class="mb-3 w-75">
            <label for="notes" class="form-label">Notes</label>
            <textarea id="notes" class="form-control" placeholder="Enter notes"></textarea>
          </div>

          <div class="mb-3 w-50">
            <label for="status" class="form-label">Status</label>
            <select id="status" class="form-select" disabled>
              <option value="1" selected>Placed</option>
            </select>
          </div>

          <div class="mb-3 w-50">
            <label for="staff" class="form-label">Staff</label>
            <select id="staff" class="form-select" disabled>
              <option value="0" selected>Jordan Reyes</option>
            </select>
          </div>

          <div class="d-flex flex-row justify-content-end w-100 gap-4 mt-4">
            <div class="d-flex justify-content-end">
              <a href="/orders.html" class="btn btn-outline-primary me-2">Cancel</a>
              <button type="submit" class="btn btn-primary">
                <svg class="bi pe-none me-2" width="16" height="16" fill="#FFFFFF">
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save order
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/validation.js"></script>
  </body>
</html>
