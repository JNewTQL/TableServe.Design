<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — Edit Staff</title>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <form class="d-flex flex-wrap w-50 gap-2" novalidate data-success="/staff.html">
          <div class="d-flex flex-row gap-4">
            <div class="mb-3 w-50">
              <label for="firstName" class="form-label">First Name</label>
              <input id="firstName" type="text" class="form-control" value="Justin" required />
              <div class="invalid-feedback">First name is required</div>
            </div>

            <div class="mb-3 w-50">
              <label for="lastName" class="form-label">Last Name</label>
              <input id="lastName" type="text" class="form-control" value="New" required />
              <div class="valid-feedback">First name is required</div>
            </div>
          </div>

          <div class="d-flex flex-row gap-4">
            <div class="mb-3 w-50">
              <label class="form-label" for="email">Email</label>
              <input id="email" class="form-control" type="email" value="jnew@tql.com" />
            </div>

            <div class="mb-3 w-50">
              <label class="form-label" for="phone">Phone</label>
              <input id="phone" class="form-control" type="text" value="5133700203" />
            </div>
          </div>

          <div class="d-flex flex-row gap-4">
            <div class="mb-3 w-50">
              <label class="form-label" for="username">Username</label>
              <input id="username" class="form-control" type="text" value="jnew" />
            </div>

            <div class="mb-3 w-50">
              <label class="form-label" for="password">Password</label>
              <input id="password" class="form-control" type="password" value="pass123" />
            </div>
          </div>

          <div class="w-100 d-flex flex-column gap-2">
            <label class="form-label mb-0">Role</label>
            <div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="isManager" checked />
                <label class="form-check-label" for="isManager">Manager</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="isAdmin" checked />
                <label class="form-check-label" for="isAdmin">Admin</label>
              </div>
            </div>
          </div>
          <div class="d-flex flex-row justify-content-end w-100 gap-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/staff.html" class="btn btn-outline-primary me-2">Cancel</a>
              <button type="submit" class="btn btn-primary">
                <svg class="bi pe-none me-2" width="16" height="16" fill="#FFFFFF">
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save staff
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/validation.js"></script>
  </body>
</html>
